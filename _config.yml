# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.github_repo }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
# ========================
# 基础站点配置
# ========================
title: "Bei's Creative World | Bei的创意世界 (building...)"
description: "Illustration Portfolio & Tech Lab | 插画作品集与技术实验室"
baseurl: ""  # 必须为空！因为站点托管在根域名(username.github.io)
url: "https://zoe-b-zhang.github.io"  # 替换为你的实际地址

# ========================
# 多语言系统配置
# ========================
languages: ["en", "zh"]  # 支持的语言代码
default_lang: "zh"       # 默认语言

# 文本翻译字典 (在模板中用 site.translations.键名.语言 调用)
translations:
  # 插画部分标题/描述 (关联到 gallery.md)
  gallery_title:
    en: "🎨 Illustration Gallery"
    zh: "🎨 插画作品集"
  gallery_desc:
    en: "Handmade & Digital Artworks"
    zh: "手绘与数字创作精选"
  
  # 技术项目标题/描述 (关联到 projects.md)
  projects_title:
    en: "💻 Tech Projects"
    zh: "💻 技术项目"
  projects_desc:
    en: "Art-Tech Experiments"
    zh: "艺术科技实验"
  
  # 导航菜单文本
  home_text:
    en: "Home"
    zh: "首页"
  contact_text:
    en: "Contact"
    zh: "联系"

# ========================
# 文件结构关联配置
# ========================
# 导航菜单配置 (自动关联到文件结构)
header_pages:
  # 英文导航 (关联到 en/ 目录下的文件)
  en:
    - url: "/en/"        # 关联 en/index.md
      title: "{{ site.translations.home_text.en }}"
    - url: "/en/gallery" # 关联 en/gallery.md
      title: "{{ site.translations.gallery_title.en }}"
    - url: "/en/projects" # 关联 en/projects.md
      title: "{{ site.translations.projects_title.en }}"
  
  # 中文导航 (关联到 zh/ 目录下的文件)
  zh:
    - url: "/zh/"
      title: "{{ site.translations.home_text.zh }}"
    - url: "/zh/gallery"
      title: "{{ site.translations.gallery_title.zh }}"
    - url: "/zh/projects"
      title: "{{ site.translations.projects_title.zh }}"

# ========================
# 永久链接与路径配置
# ========================
permalink: pretty  # 生成美观的URL格式: /zh/gallery/
exclude:  # 排除不需要处理的文件/目录
  - "node_modules/"
  - "*.gemspec"
  - "*.gem"
  - "Gemfile"
  - "Gemfile.lock"
  - "package.json"
  - "package-lock.json"
  - "script/"
  - "LICENSE.txt"
  - "lib/"
  - "bin/"
  - "Rakefile"
  - "vendor/"

# ========================
# 功能模块配置
# ========================
# 搜索功能 (需要添加搜索页)
search_enabled: true
search_placeholder: 
  en: "Search artworks..."
  zh: "搜索作品..."

# 右上角附加链接 (保持原配置)
aux_links:
  "Just the Docs on GitHub":
    - "//github.com/pmarsceill/just-the-docs"

# 颜色方案 (nil=默认, dark=深色模式)
color_scheme: nil

# Google Analytics (替换为你的跟踪ID)
ga_tracking: UA-XXXXX-Y 

# ========================
# Jekyll 主题与插件
# ========================
theme: minima  # GitHub Pages 支持的主题

plugins:
  - jekyll-feed        # RSS 支持
  - jekyll-seo-tag     # SEO优化
  - jekyll-sitemap     # 站点地图

# ========================
# 自定义变量
# ========================
# 社交媒体链接
social_links:
  behance: ""
  instagram: ""
  
# 联系信息
contact:
  email: ""
 
