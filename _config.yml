# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.github_repo }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "Bei's Creative World | Bei的创意世界 (building...)"
description: "Illustration Portfolio & Tech Lab "
baseurl: ""  
url: "https://zoe-b-zhang.github.io"  

languages: ["en", "zh"]  # 支持的语言代码
default_lang: "en"       # 默认语言

# 
translations:
  gallery_title:
    en: "Illustration Gallery"
    zh: "插画作品集"
  gallery_desc:
    en: "Handmade & Digital Artworks"
    zh: "手绘与数字创作精选"
  projects_title:
    en: "💻 Tech Projects"
    zh: "💻 技术项目"
  projects_desc:
    en: "Art-Tech Experiments"
    zh: "科技实验"
  
  # 
  home_text:
    en: "Home"
    zh: "首页"
  contact_text:
    en: "Contact"
    zh: "联系"

header_pages:
  # 
  en:
    - url: "/en/"        # 关联 en/index.md
      title: "{{ site.translations.home_text.en }}"
    - url: "/en/gallery" # 关联 en/gallery.md
      title: "{{ site.translations.gallery_title.en }}"
    - url: "/en/projects" # 关联 en/projects.md
      title: "{{ site.translations.projects_title.en }}"
  
  # 
  zh:
    - url: "/zh/"
      title: "{{ site.translations.home_text.zh }}"
    - url: "/zh/gallery"
      title: "{{ site.translations.gallery_title.zh }}"
    - url: "/zh/projects"
      title: "{{ site.translations.projects_title.zh }}"

permalink: pretty  #
exclude:  #
  - "node_modules/"
  - "*.gemspec"
  - "*.gem"
  - "Gemfile"
  - "Gemfile.lock"
  - "package.json"
  - "package-lock.json"
  - "script/"
  - "LICENSE.txt"
  - "lib/"
  - "bin/"
  - "Rakefile"
  - "vendor/"

# ========================
# 功能模块配置
# ========================
# 搜索功能 (需要添加搜索页)
search_enabled: true
search_placeholder: 
  en: "Search artworks..."
  zh: "搜索作品..."
  
color_scheme: nil

theme: minima  # GitHub Pages 支持的主题

plugins:
  - jekyll-feed        # RSS 支持
  - jekyll-seo-tag     # SEO优化
  - jekyll-sitemap     # 站点地图

social_links:
  behance: ""
  instagram: ""
  
# 联系信息
contact:
  email: ""
 
