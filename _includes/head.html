<header>
  <nav>
    <ul>
      <!-- 动态生成导航 -->
      {% for item in site.header_pages[page.lang] %}
        <li>
          <a href="{{ item | replace: '.md', '.html' }}">{{ site.translations[item].title }}</a>
        </li>
      {% endfor %}
    </ul>
  </nav>
  
  <div class="lang-indicator">
    {% if page.lang == 'zh' %}中文{% else %}English{% endif %}
  </div>
</header>
</head>
